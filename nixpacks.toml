[phases.setup]
nixPkgs = [
  "php83",
  "php83Extensions.pdo_mysql",
  "php83Extensions.mbstring",
  "php83Extensions.xml",
  "php83Extensions.ctype",
  "php83Extensions.fileinfo",
  "php83Extensions.bcmath",
  "php83Extensions.tokenizer",
  "php83Extensions.gd",
  "composer"
]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader"
]

[start]
cmd = "php artisan storage:link --force && php artisan migrate --force && php artisan config:cache && php artisan view:cache && php -S 0.0.0.0:$PORT -t public"
